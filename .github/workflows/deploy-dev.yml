name: Deploy — dev

on:
  pull_request:
    paths:
      - "app/**"
      - "infra/**"
      - ".github/workflows/deploy-dev.yml"
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "infra/**"
      - ".github/workflows/deploy-dev.yml"

env:
  AWS_REGION: us-east-2
  TF_VERSION: 1.9.8
  ENV_DIR: infra/envs/dev

permissions:
  contents: read
  id-token: write   # reserved for ADR-010 v1.5 OIDC migration
  pull-requests: write   # so the plan job can post a comment

jobs:
  build-lambda:
    name: Build Lambda zip
    runs-on: ubuntu-24.04
    outputs:
      zip-sha256: ${{ steps.hash.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Build venv (host build, but the script targets manylinux2014_aarch64)
        run: |
          uv venv --python 3.12 app/.venv
          uv pip install --python app/.venv/bin/python -e "app[dev]"
          app/.venv/bin/python -m ensurepip --upgrade

      - name: Build Lambda zip
        run: bash app/scripts/build_lambda_package.sh

      - name: Hash zip for caching
        id: hash
        run: echo "sha=$(sha256sum app/build/lambda.zip | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: app/build/lambda.zip
          retention-days: 7

  plan:
    name: terraform plan
    needs: build-lambda
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download Lambda zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: app/build

      - name: Configure AWS credentials (static keys; ADR-010 v1.5 = OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform init
        working-directory: ${{ env.ENV_DIR }}
        run: terraform init -input=false

      - name: terraform plan
        working-directory: ${{ env.ENV_DIR }}
        env:
          TF_VAR_alarm_email: ${{ secrets.ALARM_EMAIL }}
        run: |
          terraform plan -input=false -no-color -out=tfplan | tee plan.txt
          terraform show -no-color tfplan > plan-show.txt

      - name: Upload plan artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.ENV_DIR }}/tfplan
          retention-days: 1

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planPath = `${process.env.ENV_DIR}/plan-show.txt`;
            let plan = fs.readFileSync(planPath, 'utf8');
            // GitHub comment hard-cap is ~65536 chars; truncate verbosely.
            const limit = 60000;
            if (plan.length > limit) {
              plan = plan.slice(0, limit) + `\n\n… (truncated; see workflow logs for full plan)\n`;
            }
            const body = `### \`terraform plan\` — \`${process.env.ENV_DIR}\`\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${plan}\n\`\`\`\n\n</details>`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            await github.rest.issues.createComment({ owner, repo, issue_number, body });

  apply:
    name: terraform apply (manual approval)
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: dev-apply
      url: https://d333zl5hz71w0e.cloudfront.net
    steps:
      - uses: actions/checkout@v4

      - name: Download Lambda zip
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: app/build

      - name: Download saved plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.ENV_DIR }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform init
        working-directory: ${{ env.ENV_DIR }}
        run: terraform init -input=false

      - name: terraform apply (saved plan)
        working-directory: ${{ env.ENV_DIR }}
        run: terraform apply -input=false -no-color tfplan

      - name: Deploy UI to S3 + invalidate CloudFront
        run: bash app/scripts/deploy_ui.sh dev
