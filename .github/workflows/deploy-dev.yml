# ============================================================================
# v1: deployment is a local `terraform apply` from the operator's machine.
#
# CI is intentionally read-only pending the OIDC migration documented in
# ADR-010. There are no long-lived AWS access keys in GitHub Secrets — that
# is by design, not oversight. Adding `AWS_ACCESS_KEY_ID` / `AWS_SECRET_
# ACCESS_KEY` would make this workflow run, but it would also create a
# durable credential surface we don't want for a one-day demo on a personal
# account.
#
# This workflow stays as a `workflow_dispatch` placeholder so:
#   - The Lambda zip can be built and inspected on a clean Ubuntu runner
#     (catches "works on my mac" packaging drift early).
#   - The shape of the future OIDC + apply flow is preserved in tree, so
#     the v1.5 cutover is a workflow-only edit (drop the dispatch-only
#     guard, restore the AWS credentials step using the OIDC role, and
#     add the apply job back).
#
# v1.5 migration plan: see DECISIONS.md ADR-010 — provision the GitHub OIDC
# provider + per-repo deploy role, replace `aws-actions/configure-aws-
# credentials` with the OIDC variant (`role-to-assume:`), and re-enable
# the trigger on `push: branches: [main]`.
# ============================================================================

name: Deploy — dev (manual)

on:
  workflow_dispatch:

env:
  TF_VERSION: 1.9.8
  ENV_DIR: infra/envs/dev

permissions:
  contents: read

jobs:
  build-lambda:
    name: Build Lambda zip (no AWS auth)
    runs-on: ubuntu-24.04
    outputs:
      zip-sha256: ${{ steps.hash.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Provision Python 3.12 venv (target manylinux2014_aarch64 wheels)
        run: |
          uv venv --python 3.12 app/.venv
          uv pip install --python app/.venv/bin/python -e "app[dev]"
          app/.venv/bin/python -m ensurepip --upgrade

      - name: Build Lambda zip
        run: bash app/scripts/build_lambda_package.sh

      - name: Hash zip
        id: hash
        run: echo "sha=$(sha256sum app/build/lambda.zip | cut -d ' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: app/build/lambda.zip
          retention-days: 7

  terraform-validate:
    name: Terraform validate (no AWS auth)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: terraform fmt -check
        run: terraform fmt -recursive -check infra/

      - name: terraform init (no backend; no AWS calls)
        working-directory: ${{ env.ENV_DIR }}
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: ${{ env.ENV_DIR }}
        run: terraform validate -no-color
