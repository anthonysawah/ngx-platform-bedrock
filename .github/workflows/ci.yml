name: CI

on:
  pull_request:
  push:
    branches:
      - main

# A pull_request can trigger any number of jobs running on the same ref;
# cancel older runs when newer commits land.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Some pinned actions (hashicorp/setup-terraform@v3, astral-sh/setup-uv@v6)
  # still bundle Node 20 even at their current major. Forcing Node 24
  # silences the runner's deprecation warnings without action-version
  # archaeology. GitHub flips this default on June 2, 2026; this just
  # opts in early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  python:
    name: Python — ruff + pytest
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v5

      # Direct install instead of astral-sh/setup-uv to avoid the action's
      # internal Node 20 runtime (still bundled even at @v6). Curl-based
      # install is Astral's own canonical instruction.
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Provision Python 3.12 venv
        run: |
          uv venv --python 3.12 .venv
          uv pip install --python .venv/bin/python -e ".[dev]"

      - name: ruff format --check
        run: .venv/bin/ruff format --check src tests

      - name: ruff check
        run: .venv/bin/ruff check src tests

      - name: pytest
        run: .venv/bin/python -m pytest -ra

  terraform:
    name: Terraform — fmt + validate
    runs-on: ubuntu-24.04
    env:
      TF_VERSION: 1.9.8
    steps:
      - uses: actions/checkout@v5

      # Direct binary install instead of hashicorp/setup-terraform to avoid
      # the action's internal Node 20 runtime. Pinned version matches the
      # one used by the operator's local apply.
      - name: Install Terraform ${{ env.TF_VERSION }}
        run: |
          wget -q "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"
          unzip -q "terraform_${TF_VERSION}_linux_amd64.zip"
          sudo mv terraform /usr/local/bin/
          terraform version

      - name: terraform fmt -check
        run: terraform fmt -recursive -check infra/

      - name: terraform init (no backend)
        working-directory: infra/envs/dev
        run: terraform init -backend=false -input=false

      - name: terraform validate
        working-directory: infra/envs/dev
        run: terraform validate -no-color

  checkov:
    name: Checkov — IaC scan
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Run Checkov on infra/
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra
          framework: terraform
          config_file: .checkov.yml # explicit skip-list, one entry per ADR / DECISIONS gap
          quiet: true
          soft_fail: true # v1: report findings, don't block. Tighten in v1.5.
          output_format: cli
          download_external_modules: false
